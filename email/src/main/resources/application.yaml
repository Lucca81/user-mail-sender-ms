server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5433/ms_email_ms
    username: ${DB_EMAIL_USERNAME}
    password: ${DB_EMAIL_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.resend.com
    port: 465
    username: ${MAIL_USERNAME:resend}
    password: ${RESEND_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  rabbitmq:
    addresses: ${RABBITMQ_ADDRESSES:localhost:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:false}
    listener:
      simple:
        missing-queues-fatal: false

app:
  rabbitmq:
    queue: email-queue
  mail:
    sender: "onboarding@resend.dev"


